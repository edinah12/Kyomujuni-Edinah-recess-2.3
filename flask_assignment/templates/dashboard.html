<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap');

        :root {
            --bg-main: #f5efe6;
            --bg-accent: #d8c4b6;
            --card: #ffffffd9;
            --text-main: #2e1f1a;
            --primary: #a84448;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Manrope", sans-serif;
            background: radial-gradient(circle at 5% 15%, #f2d7c9 0, transparent 32%),
                        radial-gradient(circle at 95% 80%, #ccb9a8 0, transparent 42%),
                        linear-gradient(140deg, var(--bg-main), var(--bg-accent));
            color: var(--text-main);
            padding: 1rem;
        }

        .panel {
            width: 100%;
            max-width: 460px;
            background: var(--card);
            border-radius: 18px;
            border: 1px solid #fff;
            box-shadow: 0 16px 44px rgba(43, 26, 18, 0.16);
            padding: 2rem 1.6rem;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 1.7rem;
        }

        p {
            margin: 0.8rem 0 1.3rem;
            line-height: 1.5;
        }

        a {
            text-decoration: none;
            display: inline-block;
            border-radius: 10px;
            padding: 0.75rem 1.1rem;
            font-weight: 700;
            color: #fff;
            background: var(--primary);
        }
    </style>
</head>
<body>
    <section class="panel">
        <h1>Dashboard</h1>
        <p>You are logged in as <strong>{{ username }}</strong>.</p>
        <a href="{{ url_for('logout') }}">Log Out</a>
    </section>
</body>
</html>
