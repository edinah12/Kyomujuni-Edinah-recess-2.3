<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap');

        :root {
            --bg-main: #f5efe6;
            --bg-accent: #d8c4b6;
            --card: #ffffffcc;
            --text-main: #2e1f1a;
            --text-muted: #5a463e;
            --primary: #a84448;
            --primary-dark: #8e2f35;
            --danger: #c0392b;
            --ok: #1f7a5a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Manrope", sans-serif;
            color: var(--text-main);
            background: radial-gradient(circle at 10% 10%, #f2d7c9 0, transparent 35%),
                        radial-gradient(circle at 90% 90%, #ccb9a8 0, transparent 45%),
                        linear-gradient(140deg, var(--bg-main), var(--bg-accent));
            padding: 1rem;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            backdrop-filter: blur(4px);
            border: 1px solid #ffffff;
            border-radius: 18px;
            padding: 2rem 1.6rem;
            box-shadow: 0 18px 50px rgba(43, 26, 18, 0.18);
            animation: pop-in 450ms ease;
        }

        h1 {
            margin: 0 0 0.45rem;
            font-size: 1.7rem;
        }

        .subtitle {
            margin: 0 0 1.4rem;
            color: var(--text-muted);
            font-size: 0.97rem;
        }

        form {
            display: grid;
            gap: 0.95rem;
        }

        label {
            font-size: 0.92rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            margin-top: 0.35rem;
            border: 1px solid #d9c8bd;
            border-radius: 10px;
            padding: 0.72rem 0.8rem;
            font: inherit;
            background: #fff;
        }

        input:focus {
            outline: 2px solid #e1a0a3;
            border-color: #d88b8f;
        }

        button {
            margin-top: 0.3rem;
            border: 0;
            border-radius: 10px;
            padding: 0.8rem;
            font: inherit;
            font-weight: 700;
            letter-spacing: 0.2px;
            color: #fff;
            background: linear-gradient(180deg, var(--primary), var(--primary-dark));
            cursor: pointer;
            transition: transform 140ms ease, filter 140ms ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        .alert {
            margin-bottom: 0.9rem;
            border-radius: 10px;
            padding: 0.72rem 0.85rem;
            font-size: 0.92rem;
        }

        .alert.error {
            background: #fde9e7;
            color: var(--danger);
            border: 1px solid #f3c0ba;
        }

        .alert.success {
            background: #e6f6ef;
            color: var(--ok);
            border: 1px solid #b8e3d1;
        }

        .hint {
            margin-top: 1rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        @keyframes pop-in {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Please sign in to continue.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('login') }}">
            <label for="username">
                Username
                <input id="username" name="username" type="text" placeholder="Enter username" required>
            </label>

            <label for="password">
                Password
                <input id="password" name="password" type="password" placeholder="Enter password" required>
            </label>

            <button type="submit">Log In</button>
        </form>

        <p class="hint">Demo credentials: username <strong>admin</strong>, password <strong>1234</strong></p>
    </main>
</body>
</html>
